<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabla Periódica Interactiva</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --fondo: #06060f;
            --acento1: #00ffff;
            --acento2: #f0c040;
            --fuente-titulo: 'Orbitron', sans-serif;
            --fuente-datos: 'Courier New', monospace;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            background: var(--fondo);
            color: #fff;
            font-family: var(--fuente-datos);
            min-height: 100vh;
            padding-top: 80px;
        }
        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: rgba(6, 6, 15, 0.95);
            padding: 15px 20px;
            z-index: 1000;
            border-bottom: 2px solid var(--acento1);
        }
        .header h1 {
            margin: 0 0 10px 0;
            font-family: var(--fuente-titulo);
            color: var(--acento1);
            font-size: 1.8rem;
        }
        .search-container {
            position: relative;
            max-width: 400px;
            margin: 0 auto;
        }
        .search-toggle {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--acento1);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .search-input {
            width: 100%;
            padding: 12px 15px 12px 40px;
            font-size: 1rem;
            border: 1px solid var(--acento1);
            border-radius: 25px;
            background: #111;
            color: #ffffff;
            font-family: var(--fuente-datos);
            opacity: 0;
            height: 0;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        .search-input.active {
            opacity: 1;
            height: 45px;
            padding-top: 12px;
            padding-bottom: 12px;
        }
        .filtros {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
            padding: 10px 0;
        }
        .filtro-btn {
            padding: 8px 15px;
            border: 1px solid var(--acento1);
            border-radius: 20px;
            background: transparent;
            color: var(--acento1);
            cursor: pointer;
            font-family: var(--fuente-datos);
            font-size: 0.85rem;
            transition: all 0.3s;
        }
        .filtro-btn:hover, .filtro-btn.activo {
            background: var(--acento2);
            color: #000;
        }
        .tabla {
            display: grid;
            grid-template-columns: repeat(18, 1fr);
            gap: 8px;
            padding: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }
        .elemento {
            background: #111;
            padding: 12px 5px;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
            min-height: 70px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .elemento:hover {
            transform: scale(1.08);
            z-index: 10;
        }
        .elemento .simbolo {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--acento1);
            margin-bottom: 3px;
        }
        .elemento .nombre {
            font-size: 0.7rem;
            color: #ccc;
        }
        .elemento .numero {
            font-size: 0.75rem;
            color: var(--acento2);
            margin-top: 3px;
        }
        .panel {
            position: fixed;
            top: 0; right: -400px;
            width: 380px;
            height: 100vh;
            background: #0a0a1a;
            padding: 30px 25px;
            border-left: 3px solid var(--acento1);
            display: none;
            flex-direction: column;
            overflow-y: auto;
            z-index: 2000;
            transition: right 0.3s;
        }
        .panel.active {
            display: flex;
            right: 0;
        }
        .cerrar {
            position: absolute;
            top: 15px; right: 15px;
            background: none;
            border: none;
            color: var(--acento1);
            font-size: 1.5rem;
            cursor: pointer;
        }
        .panel h2 {
            margin: 0 0 15px 0;
            color: var(--acento1);
            font-family: var(--fuente-titulo);
            font-size: 1.6rem;
        }
        .panel p {
            margin: 10px 0;
            line-height: 1.4;
        }
        .panel .etiqueta {
            color: var(--acento2);
            font-weight: bold;
        }
        .orbital-visual {
            width: 200px;
            height: 200px;
            margin: 15px auto;
            position: relative;
        }
        #orbitalCanvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid var(--acento1);
        }
        .element-data {
            margin-top: 15px;
        }
        @media (max-width: 900px) {
            .tabla { grid-template-columns: repeat(6, 1fr); }
            .panel { width: 100%; right: -100%; }
            .search-container { max-width: 300px; }
        }
    </style>
</head>
<body>

        // Motor de dibujo atómico pura (sin dependencias)
        function AtomEngine(canvas, electronsPerLevel) {
            const ctx = canvas.getContext('2d');
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const angles = electronsPerLevel.map(n =>
                Array(n).fill(0).map((_,i) =>
                    (2 * Math.PI * i) / n
                )
            );
            const speeds = [0.04, 0.025, 0.015, 0.01, 0.007, 0.005, 0.003];

            function resize() {
                const dpr = window.devicePixelRatio || 1;
                const rect = canvas.getBoundingClientRect();
                canvas.width = rect.width * dpr;
                canvas.height = rect.height * dpr;
                ctx.scale(dpr, dpr);
            }

            resize();

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Núcleo
                ctx.beginPath();
                ctx.arc(cx, cy, 8, 0, Math.PI * 2);
                ctx.fillStyle = '#f0c040';
                ctx.fill();

                // Por cada nivel
                electronsPerLevel.forEach((count, level) => {
                    const radius = (level + 1) * 35;

                    // Dibujar orbital
                    ctx.beginPath();
                    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(0,255,255,0.15)';
                    ctx.lineWidth = 1;
                    ctx.stroke();

                    // Dibujar y mover electrones
                    angles[level].forEach((angle, i) => {
                        const x = cx + radius * Math.cos(angle);
                        const y = cy + radius * Math.sin(angle);
                        ctx.beginPath();
                        ctx.arc(x, y, 4, 0, Math.PI * 2);
                        ctx.fillStyle = '#00ffff';
                        ctx.shadowBlur = 8;
                        ctx.shadowColor = '#00ffff';
                        ctx.fill();
                        angles[level][i] += speeds[level];
                    });
                });

                requestAnimationFrame(draw);
            }

            draw();
        }

        // Calcular electronsPerLevel desde el número atómico
        function calculateElectronsPerLevel(atomicNumber) {
            const maxPerLevel = [2, 8, 18, 32, 32, 18, 8]; // Distribución máxima por nivel
            let electrons = atomicNumber;
            let result = [];

            for (let i = 0; i < maxPerLevel.length; i++) {
                const currentLevelMax = maxPerLevel[i];
                result.push(Math.min(currentLevelMax, electrons));
                electrons -= result[i];
                if (electrons === 0) break;
            }

            return result;
        }

                        const canvas = this.querySelector('#orbitalCanvas');
                        if (canvas && this.elementoActivo) {
                            // Calcular electronsPerLevel desde el número atómico
                            const electronsPerLevel = calculateElectronsPerLevel(this.elementoActivo.atomic_number);
                            // Llamar al motor de dibujo
                            AtomEngine(canvas, electronsPerLevel);
                        }
                    }
                });
            });
        }

            tabla.innerHTML = '';

                const div = document.createElement('div');
                div.className = 'elemento';
                div.style.backgroundColor = colores[el.category] || '#333';
                div.dataset.categoria = el.category.toLowerCase().replace(/\s+/g, '-');
                div.innerHTML = `<div class="simbolo">${el.symbol}</div><div class="nombre">${el.name}</div><div class="numero">${el.atomic_number}</div>`;

            });

        function mostrarPanel(el) {
            // Almacenar elemento activo para orbitales
            panel.elementoActivo = el;

            panel.innerHTML = `

                </div>
                <div class="element-data">

                    <p><span class="etiqueta">Dato curioso:</span> ${el.curious_fact}</p>
                </div>
            `;

            panel.classList.add('active');

            // Iniciar el motor de dibujo atómico
            // Usamos setTimeout para asegurarnos de que el canvas está renderizado
            setTimeout(() => {
                const canvas = panel.querySelector('#orbitalCanvas');
                if (canvas) {
                    const electronsPerLevel = calculateElectronsPerLevel(el.atomic_number);

                }
            }, 10);

        function filtrarCategoria(cat) {
            categoriaActiva = cat;

            const targetBtn = event ? event.target : document.querySelector('.filtro-btn[data-categoria="todo"]');
            targetBtn.classList.add('activo');

            document.querySelectorAll('.elemento').forEach(el => {

                    el.style.opacity = '1';
                } else {
                    el.style.opacity = '0.3';
                }
            });
        }

        // Funciones para búsqueda
        function inicializarBusqueda() {
            // Toggle para búsqueda
            toggleBusqueda.addEventListener('click', function() {
                buscador.classList.toggle('active');
                if (buscador.classList.contains('active')) {
                    buscador.focus();
                }
            });

            // Cerrar búsqueda cuando se hace clic fuera
            document.addEventListener('click', function(e) {
                if (!buscador.contains(e.target) && !toggleBusqueda.contains(e.target)) {
                    buscador.classList.remove('active');
                }
            });

            // Evento de búsqueda
            buscador.addEventListener('input', function() {
                const texto = this.value.toLowerCase();
                document.querySelectorAll('.elemento').forEach(el => {
                    const nombre = el.querySelector('.nombre').textContent.toLowerCase();
                    const simbolo = el.querySelector('.simbolo').textContent.toLowerCase();
                    if (nombre.includes(texto) || simbolo.includes(texto)) {
                        el.style.display = 'flex';
                    } else {
                        el.style.display = 'none';
                    }
                });
            });
        }

        cerrar.addEventListener('click', () => panel.classList.remove('active'));
